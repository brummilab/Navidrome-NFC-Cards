<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Navidrome NFC Cards{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-music-note-beamed me-2"></i>NFC Cards
    </a>
    <div class="navbar-nav ms-auto gap-1">
      <a class="nav-link px-3 {% if request.endpoint == 'index' %}active{% endif %}" href="/">
        <i class="bi bi-grid-3x3-gap me-1"></i>Karten
      </a>
      <a class="nav-link px-3 {% if request.endpoint == 'scan' %}active{% endif %}" href="/scan">
        <i class="bi bi-wifi me-1"></i>Scannen
      </a>
      <a class="nav-link px-3 {% if request.endpoint == 'search' %}active{% endif %}" href="/search">
        <i class="bi bi-search me-1"></i>Musik
      </a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
